name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # Rebuilds from scratch and fails if committed `dist/` drifts from source.
      # Redundant build with the step above (~30ms on this bundle) is intentional —
      # keeps the explicit "Build" status check that branch protection requires.
      - name: Verify dist matches source
        run: npm run verify:dist
